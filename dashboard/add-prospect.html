<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Add New Prospect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #f8fafc;
      padding: 32px;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #0f1b2d;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 {
      margin-top: 0;
      font-size: 34px;
    }
    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.16);
      background: #07111f;
      color: #fff;
      padding: 14px;
      font-size: 16px;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      background: #4da3ff;
      color: #06111f;
      font-weight: 800;
      cursor: pointer;
      font-size: 16px;
    }
    .secondary {
      display: inline-block;
      margin-top: 18px;
      color: #8ab4ff;
      text-decoration: none;
    }
    .result {
      margin-top: 22px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(77,163,255,.12);
      border: 1px solid rgba(77,163,255,.35);
      display: none;
    }
    .error {
      background: rgba(255,80,80,.12);
      border-color: rgba(255,80,80,.35);
    }
    .result a {
      color: #8ab4ff;
      display: block;
      margin: 8px 0;
    }
    .hint {
      color: #b8c7dc;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="secondary" href="/">← Back to dashboard</a>

    <section class="card">
      <h1>Add New Prospect</h1>
      <p class="hint">
        Add a business prospect. The live Cloudflare Function creates a website page,
        proposal page, email draft and business folder in GitHub.
      </p>

      <form id="prospectForm">
        <label for="businessName">Business Name</label>
        <input id="businessName" name="businessName" required placeholder="Example: Brentwood Coffee House">

        <label for="websiteUrl">Website URL or “No website”</label>
        <input id="websiteUrl" name="websiteUrl" placeholder="https://example.com or No website">

        <label for="description">Business Description / What I’m After</label>
        <textarea id="description" name="description" required placeholder="Describe the business and what kind of website/prospect you want created."></textarea>

        <label for="notes">Optional Notes</label>
        <textarea id="notes" name="notes" placeholder="Any extra notes, priority, location, tone, services, etc."></textarea>

        <button id="submitBtn" type="submit">Submit Prospect</button>
      </form>

      <div id="result" class="result"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById("prospectForm");
    const result = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      result.style.display = "block";
      result.className = "result";
      result.innerHTML = "Submitting prospect...";
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const payload = {
        businessName: document.getElementById("businessName").value,
        websiteUrl: document.getElementById("websiteUrl").value,
        description: document.getElementById("description").value,
        notes: document.getElementById("notes").value
      };

      try {
        const response = await fetch("/api/add-prospect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || "Something went wrong.");
        }

        result.innerHTML = `
          <strong>${data.message}</strong>
          <p>Slug: ${data.slug}</p>
          <a href="${data.links.website}">Website</a>
          <a href="${data.links.proposal}">Proposal</a>
          <a href="${data.links.emailDraft}">Email Draft</a>
        `;
      } catch (error) {
        result.className = "result error";
        result.innerHTML = `<strong>Error:</strong> ${error.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Prospect";
      }
    });
  </script>
</body>
</html>
